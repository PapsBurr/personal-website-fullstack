name: Deploy Frontend and Backend with Terraform

on:
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      deploy-frontend:
        description: "Deploy Frontend"
        type: boolean
        default: true
      deploy-backend:
        description: "Deploy Backend"
        type: boolean
        default: true

env:
  NODE_VERSION: "24"
  AWS_REGION: "us-east-1"

jobs:
  # Job 1: Detect Changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # Job 2: Test Backend in Dev Environment (runs if backend changed)
  test-backend-dev:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend-changed == 'true' ||
      github.event.inputs.deploy-backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --include=dev
        env:
          NODE_ENV: development

      - name: Run backend tests
        run: npm test -- --coverage
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          NODE_ENV: test
          CI: true

  # Job 3: Test Frontend in Dev Environment (runs if frontend changed)
  test-frontend-dev:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend-changed == 'true' ||
      github.event.inputs.deploy-frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache dependencies and build cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-frontend-deps-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-deps-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --coverage --watchAll=false

  # Job 4: Deploy Backend in Staging Environment (runs if backend changed)
  deploy-backend-staging-env:
    needs: [detect-changes, test-backend-dev]
    if: |
      needs.detect-changes.outputs.backend-changed == 'true' ||
      github.event.inputs.deploy-backend == 'true'
    runs-on: ubuntu-latest

